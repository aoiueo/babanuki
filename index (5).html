<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ババ抜き最終決戦！連勝チャレンジ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #1a1a1a; color: white; padding-top: 50px; }
        .game-container { background: #2c3e50; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 2px solid #34495e; }
        
        .cards { display: flex; gap: 30px; justify-content: center; margin-top: 30px; perspective: 1000px; }
        
        /* カード全体の動き */
        .card {
            width: 130px; height: 190px; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s; cursor: pointer;
        }
        
        /* めくれた時の回転 */
        .card.flipped { transform: rotateY(180deg); }

        /* カードの表面と裏面 */
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px; border: 4px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 60px;
        }

        /* 裏面（最初はこれが見える） */
        .card-back { background: #c0392b; color: white; }
        
        /* 表面（めくった後の絵柄） */
        .card-front { background: white; transform: rotateY(180deg); }
        .joker { color: black; } /* ジョーカーの色 */
        .ace { color: red; }   /* アタリ（ダイヤのA）の色 */

        #score { font-size: 32px; color: #f1c40f; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #best-score { font-size: 18px; color: #bdc3c7; }
        .message { font-size: 26px; margin-top: 30px; font-weight: bold; min-height: 40px; }
        
        button { 
            margin-top: 30px; padding: 12px 25px; font-size: 18px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 8px; transition: 0.2s;
        }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🃏 運命の二択：ババ抜き編</h1>
    <div id="score">現在の連勝数: 0</div>
    <div id="best-score">最高記録: 0</div>

    <div class="cards">
        <div id="card0" class="card" onclick="choose(0)">
            <div class="card-face card-back">？</div>
            <div id="front0" class="card-face card-front"></div>
        </div>
        <div id="card1" class="card" onclick="choose(1)">
            <div class="card-face card-back">？</div>
            <div id="front1" class="card-face card-front"></div>
        </div>
    </div>

    <div id="message" class="message">どちらかを選んで運命を決めろ！</div>
    <button onclick="resetGame()">最初から挑戦する</button>
</div>

<script>
    let currentScore = 0;
    let bestScore = 0;
    let isWaiting = false; // めくっている間の連打防止

    function choose(playerChoice) {
        if (isWaiting) return;
        isWaiting = true;

        // 0か1をランダムでジョーカーにする
        const jokerIndex = Math.floor(Math.random() * 2);
        
        const cardElements = [document.getElementById('card0'), document.getElementById('card1')];
        const fronts = [document.getElementById('front0'), document.getElementById('front1')];
        const msgDisp = document.getElementById('message');

        // 両方のカードの絵柄をセット
        for(let i=0; i<2; i++) {
            if (i === jokerIndex) {
                fronts[i].innerHTML = "<span class='joker'>🃏</span>"; // ジョーカー
            } else {
                fronts[i].innerHTML = "<span class='ace'>♦️A</span>"; // アタリ
            }
            // 両方めくる
            cardElements[i].classList.add('flipped');
        }

        if (playerChoice === jokerIndex) {
            // ババを引いた
            msgDisp.innerText = "💥 終了！ババ（ジョーカー）だ！";
            msgDisp.style.color = "#e74c3c";
        } else {
            // アタリを引いた
            currentScore++;
            msgDisp.innerText = "✨ セーフ！強運の持ち主だ！";
            msgDisp.style.color = "#2ecc71";
            document.getElementById('score').innerText = `現在の連勝数: ${currentScore}`;
            
            if (currentScore > bestScore) {
                bestScore = currentScore;
                document.getElementById('best-score').innerText = `最高記録: ${bestScore}`;
            }

            // 1.5秒後に自動で裏に戻して次の勝負へ
            setTimeout(() => {
                if (msgDisp.innerText.includes("セーフ")) {
                    cardElements[0].classList.remove('flipped');
                    cardElements[1].classList.remove('flipped');
                    msgDisp.innerText = "次の二択を選べ...";
                    msgDisp.style.color = "white";
                    isWaiting = false;
                }
            }, 1500);
        }
    }

    function resetGame() {
        currentScore = 0;
        isWaiting = false;
        document.getElementById('score').innerText = `現在の連勝数: 0`;
        document.getElementById('message').innerText = "どちらかを選んで運命を決めろ！";
        document.getElementById('message').style.color = "white";
        document.getElementById('card0').classList.remove('flipped');
        document.getElementById('card1').classList.remove('flipped');
    }
</script>

</body>
</html>
